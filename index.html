<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flip the card</title>
    <!-- Modern Typography: Outfit from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <h1>Flip the card</h1>
      <div class="utility">
        <button class="restart-btn">Restart</button>
        <div class="dropdown">
          <div class="dropdown-selected">Difficulty</div>

          <div class="dropdown-options hidden">
            <div class="dropdown-item ">Easy</div>
            <div class="dropdown-item ">Medium</div>
            <div class="dropdown-item ">Hard</div>
          </div>
        </div>
      </div>
    </nav>
    <main>
      <div class="game-body">
        <!-- Cards will be injected here by script.js -->
      </div>
      <div class="feedback">start game</div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
